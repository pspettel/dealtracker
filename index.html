<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RE/MAX Deal Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0f; min-height: 100vh; font-family: Georgia, serif; color: #e8e4dc; }

  .screen { display: none; }
  .screen.active { display: block; }

  /* Header */
  .header { background: #0d0d14; border-bottom: 1px solid #1a1a26; padding: 16px 18px 14px; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-icon { width: 30px; height: 30px; background: #cc0000; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; color: #fff; flex-shrink: 0; }
  .brand-name { font-size: 15px; font-weight: 800; color: #fff; letter-spacing: -0.02em; }
  .brand-sub { font-size: 10px; color: #2a2a38; letter-spacing: 0.08em; }
  .header-actions { display: flex; gap: 8px; align-items: center; }

  /* Tiles */
  .tiles { display: flex; gap: 8px; flex-wrap: wrap; }
  .tile { flex: 1; min-width: 110px; background: #111118; border: 1px solid #1e1e2a; border-radius: 10px; padding: 13px 15px; }
  .tile-label { color: #374151; font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 4px; }
  .tile-value { font-size: 19px; font-weight: 800; font-family: Georgia, serif; letter-spacing: -0.03em; }
  .tile-sub { color: #2a2a38; font-size: 10px; margin-top: 3px; }

  /* Filters */
  .filters { display: flex; gap: 6px; padding: 10px 16px; overflow-x: auto; border-bottom: 1px solid #1a1a26; }
  .filter-btn { background: transparent; color: #6b7280; border: 1px solid #1e1e2a; border-radius: 20px; padding: 5px 11px; font-size: 11px; font-weight: 600; cursor: pointer; white-space: nowrap; letter-spacing: 0.04em; font-family: Georgia, serif; }
  .filter-btn.active { background: #cc0000; color: #fff; border-color: #cc0000; }

  /* Deal list */
  .deal-list { padding: 10px 14px; }
  .deal-card { background: #111118; border: 1px solid #1a1a26; border-radius: 10px; padding: 12px 14px; margin-bottom: 7px; cursor: pointer; transition: background 0.15s; border-left-width: 3px; }
  .deal-card:hover { background: #161620; }
  .deal-card-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .deal-address { color: #e8e4dc; font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .deal-parties { color: #374151; font-size: 11px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .deal-comm { color: #34d399; font-size: 14px; font-weight: 800; text-align: right; flex-shrink: 0; }
  .deal-days { font-size: 10px; margin-top: 2px; text-align: right; }
  .deal-badges { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap; }
  .empty-state { color: #2a2a38; text-align: center; padding: 48px 0; font-size: 13px; }

  /* Badge */
  .badge { font-size: 10px; font-weight: 700; letter-spacing: 0.09em; padding: 2px 8px; border-radius: 20px; text-transform: uppercase; white-space: nowrap; }

  /* Buttons */
  .btn { font-family: Georgia, serif; cursor: pointer; border-radius: 8px; font-weight: 700; }
  .btn-primary { background: #cc0000; color: #fff; border: none; padding: 8px 14px; font-size: 12px; }
  .btn-save-status { background: transparent; border-radius: 8px; padding: 7px 12px; font-size: 11px; font-weight: 700; cursor: pointer; font-family: Georgia, serif; letter-spacing: 0.04em; display: flex; align-items: center; gap: 5px; border: 1px solid; }
  .btn-back { background: none; border: none; color: #6b7280; cursor: pointer; font-size: 20px; line-height: 1; padding: 0 4px 0 0; font-family: Georgia, serif; }
  .btn-edit { background: #1e1e2a; border: 1px solid #2a2a38; color: #9ca3af; border-radius: 7px; padding: 6px 12px; font-size: 11px; cursor: pointer; font-family: Georgia, serif; }
  .btn-full { width: 100%; border-radius: 10px; padding: 14px; font-size: 14px; font-weight: 800; cursor: pointer; font-family: Georgia, serif; letter-spacing: 0.04em; border: none; }
  .btn-delete { width: 100%; background: transparent; border: 1px solid #2a1515; color: #5a1f1f; border-radius: 8px; padding: 10px; font-size: 11px; font-weight: 700; cursor: pointer; font-family: Georgia, serif; letter-spacing: 0.06em; text-transform: uppercase; }

  /* Detail */
  .detail-header { background: #0d0d14; border-bottom: 1px solid #1a1a26; padding: 13px 17px; display: flex; align-items: center; gap: 12px; }
  .detail-header-title { flex: 1; min-width: 0; font-size: 13px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .detail-body { padding: 15px 17px; }
  .detail-comm { color: #34d399; font-size: 26px; font-weight: 800; letter-spacing: -0.03em; }
  .detail-sale { color: #374151; font-size: 11px; margin-top: 2px; }
  .detail-top-row { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }

  /* Stage buttons */
  .stage-row { display: flex; gap: 6px; margin-bottom: 14px; }
  .stage-btn { flex: 1; border-radius: 8px; padding: 8px 4px; font-size: 10px; font-weight: 700; cursor: pointer; font-family: Georgia, serif; letter-spacing: 0.03em; border: 1px solid; }

  /* Fields table */
  .fields-table { background: #111118; border: 1px solid #1a1a26; border-radius: 10px; margin-bottom: 14px; overflow: hidden; }
  .field-row { display: flex; gap: 10px; padding: 9px 13px; border-bottom: 1px solid #1a1a26; }
  .field-row:last-child { border-bottom: none; }
  .field-lbl { color: #2a2a38; font-size: 10px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; min-width: 50px; padding-top: 1px; }
  .field-val { color: #d1cdc7; font-size: 12px; flex: 1; }

  /* Notes */
  .notes-section { margin-bottom: 14px; }
  .section-label { color: #2a2a38; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
  .note-input-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .note-input { flex: 1; background: #111118; border: 1px solid #1e1e2a; border-radius: 8px; padding: 9px 11px; color: #e8e4dc; font-size: 12px; font-family: Georgia, serif; }
  .note-save-btn { background: #cc0000; border: none; color: #fff; border-radius: 8px; padding: 9px 14px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: Georgia, serif; }
  .note-card { background: #111118; border: 1px solid #1a1a26; border-radius: 8px; padding: 9px 12px; margin-bottom: 6px; }
  .note-text { color: #e8e4dc; font-size: 12px; }
  .note-ts { color: #2a2a38; font-size: 10px; margin-top: 4px; }
  .no-notes { color: #1f1f2a; font-size: 12px; text-align: center; padding: 12px 0; }

  /* Confirm delete */
  .confirm-row { display: flex; gap: 8px; }
  .btn-cancel { flex: 1; background: transparent; border: 1px solid #1e1e2a; color: #6b7280; border-radius: 8px; padding: 10px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: Georgia, serif; }
  .btn-confirm-del { flex: 1; background: #7f1d1d; border: 1px solid #991b1b; color: #fca5a5; border-radius: 8px; padding: 10px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: Georgia, serif; }

  /* Form */
  .form-header { background: #0d0d14; border-bottom: 1px solid #1a1a26; padding: 13px 17px; display: flex; align-items: center; gap: 12px; }
  .form-title { font-size: 15px; font-weight: 800; color: #fff; }
  .form-body { padding: 16px 17px 60px; }
  .form-field { margin-bottom: 11px; }
  .form-label { color: #374151; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
  .form-input { width: 100%; background: #111118; border: 1px solid #1e1e2a; border-radius: 8px; padding: 10px 12px; color: #e8e4dc; font-size: 13px; font-family: Georgia, serif; }
  .form-input:focus { outline: none; border-color: #2a2a48; }
  .toggle-row { display: flex; gap: 8px; margin-bottom: 20px; }
  .toggle-btn { flex: 1; border-radius: 8px; padding: 9px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: Georgia, serif; border: 1px solid; }

  /* Toast */
  #toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); border-radius: 10px; padding: 9px 18px; font-size: 13px; font-weight: 600; white-space: nowrap; z-index: 9999; pointer-events: none; font-family: Georgia, serif; box-shadow: 0 4px 24px rgba(0,0,0,0.6); display: none; }

  /* Paid toggle */
  .paid-row { display: flex; gap: 7px; margin-bottom: 12px; }
  .paid-btn { flex: 1; border-radius: 8px; padding: 9px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: Georgia, serif; border: 1px solid; }
</style>
</head>
<body>

<!-- BOARD -->
<div id="screen-board" class="screen active">
  <div class="header">
    <div class="header-top">
      <div class="brand">
        <div class="brand-icon">R</div>
        <div>
          <div class="brand-name">Deal Tracker</div>
          <div class="brand-sub">RE/MAX · 65/35 split</div>
        </div>
      </div>
      <div class="header-actions">
        <button id="save-btn" class="btn-save-status" onclick="manualSave()">✓ Saved</button>
        <button class="btn btn-primary" onclick="openAdd()">+ Add Deal</button>
      </div>
    </div>
    <div class="tiles" id="tiles"></div>
  </div>
  <div class="filters" id="filters"></div>
  <div class="deal-list" id="deal-list"></div>
</div>

<!-- DETAIL -->
<div id="screen-detail" class="screen">
  <div class="detail-header">
    <button class="btn-back" onclick="showBoard()">←</button>
    <div class="detail-header-title" id="detail-address"></div>
    <button class="btn-edit" onclick="openEdit()">Edit</button>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<!-- FORM -->
<div id="screen-form" class="screen">
  <div class="form-header">
    <button class="btn-back" id="form-back-btn" onclick="formBack()">←</button>
    <div class="form-title" id="form-title">New Deal</div>
  </div>
  <div class="form-body" id="form-body"></div>
</div>

<div id="toast"></div>

<script>
const KEY = "remax-deals-v1";

const SEED = [
  {id:1,address:"111 Parkview Place, Bellevue",buyer:"Landen Barr-Bell",seller:"Pat - Bonnie Ball",title:"Fidelity Sandusky",sale:399000,comm:9336.60,stage:"Closed",close:"2026-01-07",paid:true,remax:true,updates:[]},
  {id:2,address:"2759 Sandhill Rd, Monroeville",buyer:"Tenant",seller:"Pat - Brad Smith & Natalie Kaltenbach",title:"N/A",sale:0,comm:1040,stage:"Closed",close:"2026-01-05",paid:true,remax:true,updates:[]},
  {id:3,address:"2860 Derussey Rd, Collins",buyer:"Pat - Jeremy Plas",seller:"Norma - Harsar",title:"Tucker",sale:270000,comm:3510,stage:"Closed",close:"2026-02-09",paid:true,remax:true,updates:[]},
  {id:4,address:"13808 Riley Rd, Milan",buyer:"Jaron Smith - Amy Turton & Jeremy Swiger",seller:"Pat - Anita Marshall",title:"Foundation Title",sale:338000,comm:7250.10,stage:"Closed",close:"2026-02-20",paid:true,remax:true,updates:[]},
  {id:5,address:"720 Killbourne, Bellevue",buyer:"Pat - Consetta Leonard",seller:"Ed Haynes",title:"Land Title Group",sale:196000,comm:3057.60,stage:"Closed",close:"2026-02-26",paid:true,remax:true,updates:[]},
  {id:6,address:"29 N Hester, Norwalk",buyer:"Marketing Only",seller:"",title:"",sale:0,comm:1625,stage:"Closed",close:"2026-03-23",paid:false,remax:false,updates:[]},
  {id:7,address:"18 Lockwood, Milan",buyer:"Adrienne Quillen-Tice",seller:"Pat - Casey Dellisanti",title:"Ally Title",sale:160000,comm:3432,stage:"Closed",close:"2026-03-06",paid:true,remax:true,updates:[]},
  {id:8,address:"37 State Route 60, New London",buyer:"Pat - Gatschet",seller:"Norma - Harlow",title:"Tucker",sale:502000,comm:6526,stage:"Closed",close:"2026-03-20",paid:false,remax:false,updates:[]},
  {id:9,address:"4 Oakfield, Norwalk",buyer:"Jaron Smith - Michel",seller:"Pat - Gatschet",title:"First American",sale:304000,comm:7230.60,stage:"Closed",close:"2026-03-18",paid:false,remax:false,updates:[]},
  {id:10,address:"155 Woodlawn, Norwalk",buyer:"Brittany Laird - Taylor Braden",seller:"Pat - Deb & Dennis Hartley",title:"Chicago Title",sale:178000,comm:4165.20,stage:"Closed",close:"2026-03-16",paid:false,remax:false,updates:[]},
  {id:11,address:"720 Tracht Meadows, Huron",buyer:"Jamie Knight - Brett Fussner",seller:"Pat - Judy & Karl Bates",title:"Chicago Title Port Clinton",sale:417500,comm:7598.50,stage:"Under Contract",close:"2026-04-06",paid:false,remax:false,updates:[]},
  {id:12,address:"111 E Tiffin, Willard",buyer:"Pat - Calvin Mason & Madison Gatschet",seller:"Deanna Fishbaugh - Tamara Sayler",title:"First American",sale:154000,comm:3003,stage:"Under Contract",close:"2026-03-31",paid:false,remax:false,updates:[]},
  {id:13,address:"104 Leisure Lane, Norwalk",buyer:"Kerri Hensel - Ethel M Successor Trustee",seller:"Pat - Mary & Tom Hardy",title:"Wolph",sale:215000,comm:5031,stage:"Under Contract",close:"2026-04-10",paid:false,remax:false,updates:[]}
];

const ST = {
  "Under Contract": {border:"#2563eb",bg:"#1e3a5f",txt:"#93c5fd"},
  "Closed":         {border:"#059669",bg:"#14302a",txt:"#6ee7b7"},
  "Dead":           {border:"#6b7280",bg:"#1f1f27",txt:"#9ca3af"}
};

const FILTERS = [
  {label:"All",           fn:()=>true},
  {label:"In Contract",   fn:d=>d.stage==="Under Contract"},
  {label:"Closed",        fn:d=>d.stage==="Closed"},
  {label:"Unpaid",        fn:d=>!d.paid&&d.stage==="Closed"},
  {label:"Not in RE/MAX", fn:d=>!d.remax}
];

let deals = [];
let activeFilter = "All";
let currentDealId = null;
let formMode = "add"; // "add" | "edit"
let formData = {};
let confirmingDelete = false;

// ── Storage helpers (safe wrappers) ──
function storageGet(key) {
  try { return localStorage.getItem(key); } catch(e) { return null; }
}
function storageSet(key, val) {
  try { localStorage.setItem(key, val); return true; } catch(e) { return false; }
}

// ── Init ──
(function init() {
  try {
    const raw = storageGet(KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      deals = Array.isArray(parsed) && parsed.length > 0 ? parsed : SEED;
    } else {
      deals = SEED;
      storageSet(KEY, JSON.stringify(SEED));
    }
  } catch(e) {
    deals = SEED;
  }
  renderBoard();
})();

// ── Persist ──
function persist(next) {
  deals = next;
  const ok = storageSet(KEY, JSON.stringify(deals));
  setSaveStatus(ok ? "saved" : "error");
  if (!ok) ping("Save failed — localStorage may be blocked", "warn");
  renderBoard();
}

function manualSave() {
  const ok = storageSet(KEY, JSON.stringify(deals));
  setSaveStatus(ok ? "saved" : "error");
  ping(ok ? "All changes saved ✓" : "Save failed — localStorage may be blocked", ok ? "ok" : "warn");
}

function setSaveStatus(s) {
  const btn = document.getElementById("save-btn");
  if (!btn) return;
  if (s === "saved")  { btn.style.color="#34d399"; btn.style.borderColor="#1a3a2a"; btn.textContent="✓ Saved"; }
  if (s === "saving") { btn.style.color="#6b7280"; btn.style.borderColor="#2a2a38"; btn.textContent="⏳ Saving…"; }
  if (s === "error")  { btn.style.color="#f87171"; btn.style.borderColor="#f87171"; btn.textContent="⚠ Retry Save"; }
}

// ── Formatting ──
const $c = n => n ? "$" + Number(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}) : "—";
const fmtDate = s => { if (!s) return "—"; const d = new Date(s+"T12:00:00"); return d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"2-digit"}); };
const daysUntil = s => { if (!s) return null; return Math.ceil((new Date(s+"T12:00:00") - new Date()) / 86400000); };
const esc = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

function badge(label, color, bg) {
  return `<span class="badge" style="background:${bg};color:${color}">${esc(label)}</span>`;
}

// ── Stats ──
function calcStats() {
  return {
    total:  deals.reduce((s,d)=>s+d.comm,0),
    paid:   deals.filter(d=>d.paid).reduce((s,d)=>s+d.comm,0),
    unpaid: deals.filter(d=>!d.paid&&d.stage==="Closed").reduce((s,d)=>s+d.comm,0),
    pipe:   deals.filter(d=>d.stage==="Under Contract").reduce((s,d)=>s+d.comm,0),
    volume: deals.filter(d=>d.stage==="Closed").reduce((s,d)=>s+d.sale,0),
    remax:  deals.filter(d=>d.remax&&d.stage==="Closed").reduce((s,d)=>s+d.comm,0)/0.65,
    unpaidCount: deals.filter(d=>!d.paid&&d.stage==="Closed").length,
    pipeCount:   deals.filter(d=>d.stage==="Under Contract").length,
    closedCount: deals.filter(d=>d.stage==="Closed").length,
    remaxCount:  deals.filter(d=>d.remax&&d.stage==="Closed").length,
  };
}

function tile(label, value, color, sub) {
  return `<div class="tile"><div class="tile-label">${label}</div><div class="tile-value" style="color:${color}">${value}</div>${sub?`<div class="tile-sub">${sub}</div>`:""}</div>`;
}

// ── Board ──
function renderBoard() {
  const st = calcStats();
  document.getElementById("tiles").innerHTML =
    tile("Total", $c(st.total), "#34d399") +
    tile("Paid", $c(st.paid), "#60a5fa") +
    tile("Unpaid", $c(st.unpaid), "#f59e0b", `${st.unpaidCount} deals`) +
    tile("Pipeline", $c(st.pipe), "#c084fc", `${st.pipeCount} deals`) +
    tile("Closed Volume", $c(st.volume), "#fb923c", `${st.closedCount} closed`) +
    tile("RE/MAX CGI", $c(st.remax), "#e879f9", `${st.remaxCount} deals · comm ÷ .65`);

  document.getElementById("filters").innerHTML = FILTERS.map(f =>
    `<button class="filter-btn${activeFilter===f.label?" active":""}" onclick="setFilter('${f.label}')">${esc(f.label)} (${deals.filter(f.fn).length})</button>`
  ).join("");

  const ff = FILTERS.find(x=>x.label===activeFilter);
  const visible = ff ? deals.filter(ff.fn) : deals;

  document.getElementById("deal-list").innerHTML = visible.length === 0
    ? `<div class="empty-state">No deals here</div>`
    : visible.map(deal => {
        const s = ST[deal.stage] || ST["Dead"];
        const days = deal.stage==="Under Contract" ? daysUntil(deal.close) : null;
        const daysColor = days===null?"":days<=7?"#f87171":days<=14?"#f59e0b":"#4b5563";
        const daysLabel = days===null?"":days>0?`${days}d`:days===0?"today":`${Math.abs(days)}d past`;
        const parties = [deal.buyer,deal.seller].filter(Boolean).join(" · ");
        return `<div class="deal-card" style="border-left-color:${s.border}" onclick="openDetail(${deal.id})">
          <div class="deal-card-row">
            <div style="flex:1;min-width:0">
              <div class="deal-address">${esc(deal.address)}</div>
              <div class="deal-parties">${esc(parties)}</div>
            </div>
            <div>
              <div class="deal-comm">${$c(deal.comm)}</div>
              ${days!==null?`<div class="deal-days" style="color:${daysColor}">${daysLabel}</div>`:""}
            </div>
          </div>
          <div class="deal-badges">
            ${badge(deal.stage, s.txt, s.bg)}
            ${!deal.paid&&deal.stage==="Closed"?badge("Unpaid","#fcd34d","#292010"):""}
            ${!deal.remax?badge("Not RE/MAX","#9ca3af","#1a1a22"):""}
            ${deal.updates?.length>0?badge(`${deal.updates.length} note${deal.updates.length>1?"s":""}`, "#818cf8","#1e1e30"):""}
          </div>
        </div>`;
      }).join("");
}

function setFilter(f) { activeFilter = f; renderBoard(); }

// ── Detail ──
function openDetail(id) {
  currentDealId = id;
  confirmingDelete = false;
  renderDetail();
  show("detail");
}

function renderDetail() {
  const deal = deals.find(d=>d.id===currentDealId);
  if (!deal) return;
  const s = ST[deal.stage] || ST["Dead"];
  const days = deal.stage==="Under Contract" ? daysUntil(deal.close) : null;
  const daysColor = days===null?"":days<=7?"#f87171":days<=14?"#f59e0b":"#6b7280";

  document.getElementById("detail-address").textContent = deal.address;

  let html = `
    <div class="detail-top-row">
      <div>
        <div class="detail-comm">${$c(deal.comm)}</div>
        ${deal.sale>0?`<div class="detail-sale">Sale price: ${$c(deal.sale)}</div>`:""}
      </div>
      <div style="text-align:right">
        ${badge(deal.stage, s.txt, s.bg)}
        ${days!==null?`<div style="font-size:11px;margin-top:5px;color:${daysColor}">Close ${fmtDate(deal.close)}${days>0?` · ${days}d`:days===0?" · today":""}</div>`:""}
      </div>
    </div>

    <div class="paid-row">
      <button class="paid-btn" style="background:${deal.paid?"#14302a":"#292010"};border-color:${deal.paid?"#059669":"#92400e"};color:${deal.paid?"#6ee7b7":"#fcd34d"}" onclick="togglePaid()">
        ${deal.paid?"✓ Paid":"Mark Paid"}
      </button>
    </div>

    <div class="stage-row">
      ${["Under Contract","Closed","Dead"].map(sg => {
        const ss = ST[sg];
        const active = deal.stage===sg;
        return `<button class="stage-btn" style="background:${active?ss.bg:"transparent"};border-color:${active?ss.border:"#1e1e2a"};color:${active?ss.txt:"#374151"}" onclick="setStage('${sg}')">
          ${sg==="Under Contract"?"Contract":sg}
        </button>`;
      }).join("")}
    </div>

    <div class="fields-table">
      ${[["Buyer",deal.buyer],["Seller",deal.seller],["Title",deal.title],["Close",fmtDate(deal.close)],["RE/MAX",deal.remax?"In RE/MAX stats":"Not in RE/MAX stats"]]
        .filter(([,v])=>v&&v!=="—")
        .map(([l,v])=>`<div class="field-row"><div class="field-lbl">${l}</div><div class="field-val">${esc(v)}</div></div>`)
        .join("")}
    </div>

    <div class="notes-section">
      <div class="section-label">Notes</div>
      <div class="note-input-row">
        <input class="note-input" id="note-input" placeholder="Add a note…" onkeydown="if(event.key==='Enter')saveNote()">
        <button class="note-save-btn" onclick="saveNote()">Save</button>
      </div>
      ${(!deal.updates||deal.updates.length===0)?`<div class="no-notes">No notes</div>`:""}
      ${(deal.updates||[]).map(u=>`
        <div class="note-card">
          <div class="note-text">${esc(u.text)}</div>
          <div class="note-ts">${new Date(u.ts).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"2-digit",hour:"numeric",minute:"2-digit"})}</div>
        </div>`).join("")}
    </div>

    <div id="delete-area">
      ${confirmingDelete
        ? `<div class="confirm-row">
            <button class="btn-cancel" onclick="confirmingDelete=false;renderDetail()">Cancel</button>
            <button class="btn-confirm-del" onclick="deleteDeal()">Confirm Delete</button>
           </div>`
        : `<button class="btn-delete" onclick="confirmingDelete=true;renderDetail()">Delete Deal</button>`}
    </div>
  `;

  document.getElementById("detail-body").innerHTML = html;
}

function togglePaid() {
  const deal = deals.find(d=>d.id===currentDealId);
  persist(deals.map(d=>d.id===currentDealId?{...d,paid:!d.paid}:d));
  ping(deal.paid?"Marked unpaid":"Marked paid ✓");
  renderDetail();
}

function setStage(stage) {
  persist(deals.map(d=>d.id===currentDealId?{...d,stage}:d));
  ping(`Moved to ${stage}`);
  renderDetail();
}

function saveNote() {
  const input = document.getElementById("note-input");
  const text = input.value.trim();
  if (!text) return;
  const entry = {ts:new Date().toISOString(),text};
  persist(deals.map(d=>d.id===currentDealId?{...d,updates:[entry,...(d.updates||[])]}:d));
  ping("Note saved ✓");
  renderDetail();
}

function deleteDeal() {
  persist(deals.filter(d=>d.id!==currentDealId));
  ping("Deleted");
  showBoard();
}

// ── Form ──
function openAdd() {
  formMode = "add";
  formData = {address:"",buyer:"",seller:"",title:"",sale:"",comm:"",stage:"Under Contract",close:"",paid:false,remax:false};
  document.getElementById("form-title").textContent = "New Deal";
  renderForm();
  show("form");
}

function openEdit() {
  formMode = "edit";
  formData = {...deals.find(d=>d.id===currentDealId)};
  document.getElementById("form-title").textContent = "Edit Deal";
  renderForm();
  show("form");
}

function formBack() {
  show(formMode==="add"?"board":"detail");
}

function renderForm() {
  const f = formData;
  document.getElementById("form-body").innerHTML = `
    ${ffield("Address *","address","text","123 Main St, City")}
    ${ffield("Buyer","buyer","text","Agent - Client Name")}
    ${ffield("Seller","seller","text","Agent - Seller Name")}
    ${ffield("Title Co","title","text","Title Company")}
    ${ffield("Sale Price","sale","number","0")}
    ${ffield("Net Commission (65/35)","comm","number","0.00")}
    ${ffield("Close Date","close","date","")}

    <div class="form-field">
      <div class="form-label">Stage</div>
      <div class="stage-row">
        ${["Under Contract","Closed","Dead"].map(sg=>{
          const ss=ST[sg];const active=f.stage===sg;
          return `<button class="stage-btn" style="background:${active?ss.bg:"transparent"};border-color:${active?ss.border:"#1e1e2a"};color:${active?ss.txt:"#374151"}" onclick="setFormStage('${sg}')">
            ${sg==="Under Contract"?"Contract":sg}
          </button>`;
        }).join("")}
      </div>
    </div>

    <div class="toggle-row">
      <button class="toggle-btn" style="background:${f.paid?"#14302a":"transparent"};border-color:${f.paid?"#059669":"#1e1e2a"};color:${f.paid?"#6ee7b7":"#374151"}" onclick="toggleForm('paid')">
        ${f.paid?"✓ ":""}Paid
      </button>
      <button class="toggle-btn" style="background:${f.remax?"#14302a":"transparent"};border-color:${f.remax?"#059669":"#1e1e2a"};color:${f.remax?"#6ee7b7":"#374151"}" onclick="toggleForm('remax')">
        ${f.remax?"✓ ":""}In RE/MAX
      </button>
    </div>

    <button class="btn-full" style="background:#cc0000;color:#fff" onclick="saveDeal()">
      ${formMode==="add"?"Save Deal":"Update Deal"}
    </button>
  `;
  // Restore input values after render
  ["address","buyer","seller","title","sale","comm","close"].forEach(k=>{
    const el = document.getElementById("ff-"+k);
    if (el) el.value = f[k]||"";
  });
}

function ffield(label, key, type, placeholder) {
  return `<div class="form-field">
    <div class="form-label">${label}</div>
    <input id="ff-${key}" class="form-input" type="${type}" placeholder="${esc(placeholder)}" onchange="formData['${key}']=this.value" oninput="formData['${key}']=this.value" value="${esc(formData[key]||"")}">
  </div>`;
}

function setFormStage(sg) { formData.stage=sg; renderForm(); }
function toggleForm(k) { formData[k]=!formData[k]; renderForm(); }

function saveDeal() {
  if (!formData.address.trim()) return ping("Address required","warn");
  const d = {...formData, sale:+formData.sale||0, comm:+formData.comm||0};
  if (formMode==="add") {
    persist([...deals, {...d, id:Date.now(), updates:[]}]);
    ping("Deal added ✓"); showBoard();
  } else {
    persist(deals.map(x=>x.id===d.id?d:x));
    ping("Saved ✓"); show("detail"); renderDetail();
  }
}

// ── Navigation ──
function show(screen) {
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("screen-"+screen).classList.add("active");
  window.scrollTo(0,0);
}

function showBoard() { show("board"); renderBoard(); }

// ── Toast ──
let toastTimer;
function ping(msg, type="ok") {
  const t = document.getElementById("toast");
  const warn = type==="warn";
  t.style.background = warn?"#292010":"#14302a";
  t.style.border = `1px solid ${warn?"#92400e":"#059669"}`;
  t.style.color = warn?"#fcd34d":"#6ee7b7";
  t.textContent = msg;
  t.style.display = "block";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.style.display="none", 2600);
}
</script>
</body>
</html>
